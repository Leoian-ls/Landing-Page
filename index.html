<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Projeto Landing Page</title>
        <meta charset="UTF-8"/>
        <link href="css/style.css" rel="stylesheet" type="text/css"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="description" content="Conteúdo do meu site."/>
        <meta name="keywords" content="palavras,separadas,por,virgula"/>
        <meta name="author" content="Leonardo"/>
    </head>
    <body>
        <header>
            <div class="container">
                <img src="img/logo1.png" alt="Logo 1" class="logo-1">
                <img src="img/logo2.png" alt="Logo 2" class="logo-2">
            </div>
        </header>

        <section class="cover-form">
            <div class="container bg">
                <div class="form-container">
                    <h2>PODE ACREDITAR POR DENTRO É AINDA MELHOR!</h2>
                    <form action="">
                        <div class="form-wrapper">
                            <label for="nome">*Nome Completo</label>
                            <input type="text" name="nome" id="nome" required placeholder="Nome">
                        </div>
                        <div class="form-wrapper">
                            <label for="email">*E-mail</label>
                            <input type="email" name="email" id="email" required placeholder="Email">
                        </div>
                        <div class="form-wrapper">
                            <label for="telefone">*Telefone</label>
                            <input type="tel" name="telefone" id="telefone" required placeholder="Telefone">
                        </div>
                        <div class="form-wrapper">
                            <input type="submit" name="acao" value="Enviar">
                        </div>
                        <div class="form-wrapper">
                            <span>*Campos Obrigatórios</span>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </body>
</html>
